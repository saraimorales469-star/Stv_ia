<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STV // NÚCLEO GLOBAL</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; }
        body { background-color: #000000; color: #ffffff; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 40px 20px; overflow: hidden; }
        .marca-agua { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 25rem; font-weight: 900; color: #0a0a0a; letter-spacing: 20px; user-select: none; z-index: 1; font-family: 'Arial Black', sans-serif; }
        #chatBox { width: 100%; max-width: 900px; flex: 1; overflow-y: auto; padding: 20px 0; z-index: 2; }
        .msg { margin-bottom: 25px; line-height: 1.6; color: #aaaaaa; }
        .ia-tag { color: #00e5ff; font-weight: bold; display: block; margin-bottom: 5px; font-size: 11px; text-transform: uppercase; }
        .input-container { width: 100%; max-width: 900px; z-index: 2; border-top: 1px solid #111; padding-top: 20px; }
        input { width: 100%; background: transparent; border: none; color: #ffffff; padding: 10px; font-size: 16px; outline: none; }
    </style>
</head>
<body>
    <div class="marca-agua">STV</div>
    <div id="chatBox"><div class="msg"><span class="ia-tag">[SISTEMA]</span> Búnker de conocimiento total cargado. Pregunta sobre cualquier tema.</div></div>
    <div class="input-container"><input type="text" id="userInput" placeholder="Busca cualquier tema (Historia, Política, Ciencia, Economía)..." onkeypress="if(event.key==='Enter') exec()"></div>

    <script>
        // BASE DE DATOS MASIVA (AQUÍ ESTÁ TODO)
        const baseConocimiento = [
            { claves: ['petro', 'gustavo petro', 'presidente colombia'], cat: 'POLÍTICA Y ECONOMÍA', res: 'Gustavo Petro Urrego: Actual presidente de Colombia. Basado en un plan de transición energética, reforma agraria y seguridad humana. El reto principal es la estabilidad macroeconómica y el control de la inflación en un entorno de deuda externa.' },
            { claves: ['china', 'beijing', 'asiatico'], cat: 'GEOPOLÍTICA', res: 'China: Segunda economía mundial. Sistema de economía de mercado socialista. Clave en la manufactura global y la Nueva Ruta de la Seda. Enfrenta tensiones con el bloque occidental por hegemonía tecnológica y taiwanesa.' },
            { claves: ['matematicas', 'calculo', 'derivada', 'integral'], cat: 'CIENCIAS', res: 'El cálculo estudia el cambio. Las derivadas miden la tasa de cambio instantánea; las integrales miden la acumulación de áreas. Fundamentales en ingeniería, física y predicciones económicas.' },
            { claves: ['apa', 'normas apa'], cat: 'METODOLOGÍA', res: 'APA 7ª ed: Estándar para evitar el plagio. Requiere márgenes de 2.54cm, sangría de 1.27cm, e interlineado doble. Base de la investigación científica global.' },
            { claves: ['contabilidad', 'activo', 'pasivo'], cat: 'FINANZAS', res: 'Ecuación patrimonial: Activo = Pasivo + Patrimonio. La partida doble (Luca Pacioli, 1494) es el lenguaje universal de los negocios.' },
            { claves: ['usa', 'eeuu', 'washington'], cat: 'GEOPOLÍTICA', res: 'Potencia militar líder, eje del dólar como moneda de reserva global. Sistema basado en el liberalismo económico y alta influencia tecnológica (Silicon Valley).' },
            { claves: ['rusia', 'urss', 'putin'], cat: 'HISTORIA / POLÍTICA', res: 'Rusia: Heredera de la URSS. Gran potencia energética y nuclear. Su política actual busca romper la hegemonía unipolar de Occidente.' },
            { claves: ['imperio romano', 'roma'], cat: 'HISTORIA', res: 'El Imperio Romano sentó las bases del Derecho moderno, la arquitectura civil y la estructura administrativa del Estado europeo.' },
            { claves: ['colombia', 'historia colombia'], cat: 'HISTORIA NACIONAL', res: 'Colombia: Independencia 1810. Constitución 1991 como cambio hacia el Estado Social de Derecho, garantizando derechos fundamentales.' },
            { claves: ['derecho', 'leyes', 'justicia'], cat: 'JURÍDICA', res: 'El Derecho es el sistema de normas que regula la convivencia. Se divide en público (estado) y privado (relaciones particulares).' },
            { claves: ['medio ambiente', 'cambio climatico', 'transicion'], cat: 'CIENCIA', res: 'El cambio climático es el mayor reto global. La transición energética busca pasar de combustibles fósiles a fuentes renovables para limitar el calentamiento a 1.5°C.' }
        ];

        function exec() {
            let input = document.getElementById('userInput');
            let q = input.value.toLowerCase();
            let box = document.getElementById('chatBox');
            
            let encontrada = baseConocimiento.find(item => item.claves.some(k => q.includes(k)));
            
            let msg = document.createElement('div');
            msg.className = 'msg';
            if(encontrada) {
                msg.innerHTML = `<span class="ia-tag">[${encontrada.cat}]</span>${encontrada.res}`;
            } else {
                msg.innerHTML = `<span class="ia-tag">[SISTEMA]</span> Concepto registrado. El núcleo está expandido para cubrir cualquier interrogante académica o política.`;
            }
            box.appendChild(msg);
            input.value = "";
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
