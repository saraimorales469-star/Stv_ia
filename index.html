<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STV</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; }
        body { 
            background-color: #000000; /* Todo negro absoluto */
            color: #ffffff; /* Letras blancas */
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-between; 
            padding: 40px 20px; 
            overflow: hidden;
            position: relative;
        }
        /* STV en el puro medio, solo se miran las letras */
        .marca-agua { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            font-size: 26rem; 
            font-weight: 900; 
            color: #111111; /* Negro ligeramente visible sobre el fondo puro */
            letter-spacing: 20px; 
            user-select: none; 
            z-index: 1; 
            font-family: 'Arial Black', sans-serif;
        }
        #chatBox { width: 100%; max-width: 900px; flex: 1; overflow-y: auto; padding: 20px 0; z-index: 2; }
        #chatBox::-webkit-scrollbar { width: 4px; }
        #chatBox::-webkit-scrollbar-thumb { background: #222; }
        .msg { margin-bottom: 24px; line-height: 1.6; max-width: 100%; animation: fadeIn 0.15s ease-out; font-size: 15px; color: #aaaaaa; }
        .user-tag { color: #ffffff; font-weight: bold; display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
        .ia-tag { color: #00e5ff; font-weight: bold; display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .input-container { width: 100%; max-width: 900px; z-index: 2; border-top: 1px solid #222; padding-top: 20px; }
        .input-area { display: flex; background: #000000; width: 100%; }
        input { flex: 1; background: transparent; border: none; color: #ffffff; padding: 12px 0; font-size: 16px; outline: none; font-family: inherit; }
        input::placeholder { color: #444444; }
        /* Botón invisible o ultra minimalista */
        button { background: transparent; color: #ffffff; border: none; padding: 0 10px; cursor: pointer; font-weight: bold; font-size: 14px; font-family: inherit; }
        button:hover { color: #00e5ff; }
        .instruccion-oculta { font-size: 10px; color: #222; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

    <!-- STV EN EL MEDIO - DISEÑO UNIVERSAL -->
    <div class="marca-agua">STV</div>
    
    <div id="chatBox">
        <div class="msg"><span class="ia-tag">[STV NÚCLEO]</span> Enciclopedia global y búnker de datos activo. Interfaz purificada en blanco y negro. Listo para decodificar.</div>
    </div>

    <div class="input-container">
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Escribe un país, materia o concepto..." onkeypress="if(event.key==='Enter') exec()">
            <button onclick="exec()">//</button>
        </div>
        <!-- Truco: Si presionas las teclas Ctrl + barra espaciadora en la pantalla, lanzará una contra-pregunta aleatoria para estudiar -->
        <div class="instruccion-oculta">Ctrl + Espacio para simular ráfaga de jurado</div>
    </div>

    <script>
        let ultimoTemaDiscutido = "la historia universal";

        function calcularSimilitud(s1, s2) {
            let l1 = s1.length, l2 = s2.length;
            let m = Array.from({length: l1 + 1}, () => Array(l2 + 1).fill(0));
            for (let i = 0; i <= l1; i++) m[i][0] = i;
            for (let j = 0; j <= l2; j++) m[0][j] = j;
            for (let i = 1; i <= l1; i++) {
                for (let j = 1; j <= l2; j++) {
                    let cost = s1[i - 1] === s2[j - 1] ? 0 : 1;
                    m[i][j] = Math.min(m[i - 1][j] + 1, m[i][j - 1] + 1, m[i - 1][j - 1] + cost);
                }
            }
            return Math.max(l1, l2) === 0 ? 1 : (Math.max(l1, l2) - m[l1][l2]) / Math.max(l1, l2);
        }

        // --- BÚNKER TOTAL DE CONOCIMIENTO MUNDIAL ---
        const baseConocimiento = [
            {
                claves: ['china', 'pekin', 'beijing', 'asiatico', 'dinastia'],
                cat: 'HISTORIA DE CHINA',
                res: '<b>República Popular China:</b> Civilización milenaria gubernada históricamente por dinastías (Qin, Han, Ming, Qing). En 1949, Mao Zedong estableció el régimen actual. Hoy es la segunda potencia económica global y líder en manufactura tecnológica de alta precisión.'
            },
            {
                claves: ['rusia', 'moscu', 'sovietico', 'urss', 'putin', 'zares'],
                cat: 'GEOPOLÍTICA EUROASIÁTICA',
                res: '<b>Federación de Rusia:</b> Surgió del Imperio de los Zares y la posterior Unión Soviética (URSS), eje del bloque socialista hasta 1991. Posee la mayor extensión territorial y el arsenal nuclear más grande del mundo.'
            },
            {
                claves: ['usa', 'estados unidos', 'eeuu', 'washington', 'americano'],
                cat: 'POTENCIAS MUNDIALES',
                res: '<b>Estados Unidos:</b> Fundado en 1776 tras independizarse del Imperio Británico. Consolidó su hegemonía financiera global (Dólar) tras la Segunda Guerra Mundial. Centro neurálgico del desarrollo corporativo occidental.'
            },
            {
                claves: ['colombia', 'bogota', 'bolivar', 'independencia', 'latinoamerica'],
                cat: 'HISTORIA NACIONAL',
                res: '<b>República de Colombia:</b> Declaró su independencia el 20 de julio de 1810. Regida por la Constitución de 1991 como un Estado Social de Derecho. Destaca por su posición geoestratégica y biodiversidad continental.'
            },
            {
                claves: ['roma', 'imperio romano', 'italia', 'cesar', 'julio cesar'],
                cat: 'IMPERIOS ANTIGUOS',
                res: '<b>Imperio Romano:</b> Estructura política que unificó el Mediterráneo bajo el idioma latín y el Derecho Romano. Su caída en el 476 d.C. marcó el inicio de la Edad Media en Occidente.'
            },
            {
                claves: ['antartida', 'muro de hielo', 'byrd', 'tratado antartico'],
                cat: 'MITOLOGÍA URBANA Y GEOPOLÍTICA',
                res: '<b>Antártida:</b> Protegida por el Tratado Antártico de 1959 para fines puramente científicos. El mito del "muro de hielo" proviene de corrientes terraplanistas, mientras que las operaciones militares históricas como Highjump (1946) respondían a tensiones previas a la Guerra Fría.'
            },
            {
                claves: ['illuminati', 'iluminati', 'weishaupt', 'sociedades secretas'],
                cat: 'SOCIOLOGÍA E HISTORIA',
                res: '<b>Illuminati de Baviera:</b> Sociedad secreta real de corte ilustrado fundada por Adam Weishaupt en 1776 para combatir el dogma religioso. Fue disuelta por el gobierno bávaro en 1785.'
            },
            {
                claves: ['bilderberg', 'nuevo orden mundial', 'nom', 'elites'],
                cat: 'ANÁLISIS CORPORATIVO',
                res: '<b>Club Bilderberg:</b> Foro anual privado e informal fundado en 1954 donde líderes transatlánticos alinean criterios económicos bajo estrictas reglas de confidencialidad.'
            },
            {
                claves: ['mkultra', 'control mental', 'cia'],
                cat: 'GUERRA FRÍA',
                res: '<b>Proyecto MK Ultra:</b> Programa ilegal y encubierto de la CIA (1953-1973) que experimentó con ciudadanos usando drogas y tortura psicológica para desarrollar técnicas de interrogatorio.'
            },
            {
                claves: ['simulacion', 'bostrom', 'matrix'],
                cat: 'LÓGICA COMPUTACIONAL',
                res: '<b>Hipótesis de la Simulación:</b> Planteamiento formal de Nick Bostrom (2003) que argumenta matemáticamente la alta probabilidad de que vivamos en un entorno virtual si una civilización avanzada alcanzó un poder de cómputo óptimo.'
            },
            {
                claves: ['apa', 'normas apa', 'formato', 'citar'],
                cat: 'METODOLOGÍA APA 7',
                res: '<b>Normas APA 7ª Edición:</b> Estándar científico con márgenes de 2.54 cm, sangría en primera línea (1.27 cm), interlineado doble y listado final ordenado alfabéticamente para erradicar el plagio académico.'
            },
            {
                claves: ['contabilidad', 'activo', 'pasivo', 'patrimonio', 'pacioli'],
                cat: 'CONTABILIDAD Y FINANZAS',
                res: 'Sistema fundado por Luca Pacioli en 1494 bajo el principio de Partida Doble. Su pilar analítico es la ecuación matemática inalterable: $$Activo = Pasivo + Patrimonio$$.'
            },
            {
                claves: ['calculo', 'derivada', 'integral', 'limite'],
                cat: 'CÁLCULO INFINITESIMAL',
                res: 'Modelado matemático desarrollado por Newton y Leibniz enfocado en el estudio del cambio continuo a través de límites, razones de cambio instantáneas (Derivadas) y acumulación de áreas (Integrales).'
            }
        ];

        const sujetosA = ["el eje dinástico de China", "el legado de la URSS en Rusia", "el bloque financiero de USA", "el formato de las Normas APA 7", "la ecuación patrimonial contable"];
        const conectoresB = ["colisiona con los parámetros del cálculo infinitesimal porque", "invalida la oratoria de una sustentación técnica debido a que", "desafía la soberanía jurídica de los territorios ya que"];
        const consecuenciasC = ["los datos de las auditorías contables no reflejan variables macroeconómicas reales.", "el jurado técnico evaluará bajo un sesgo estrictamente metodológico y lineal.", "el sistema de información local opera de manera autónoma y blindada ante interferencias externas."];

        function generarContraPreguntaFractorizada() {
            let box = document.getElementById('chatBox');
            let a = sujetosA[Math.floor(Math.random() * sujetosA.length)];
            let b = conectoresB[Math.floor(Math.random() * conectoresB.length)];
            let c = consecuenciasC[Math.floor(Math.random() * consecuenciasC.length)];
            
            let userDiv = document.createElement('div');
            userDiv.className = 'msg';
            userDiv.innerHTML = `<span class="user-tag" style="color: #ff3333;">// SIMULACIÓN JURADO:</span>Si analizamos ${a}, vemos que ${b} ${c} ¿Cómo defiende técnicamente este escenario?`;
            box.appendChild(userDiv);

            setTimeout(() => {
                let iaDiv = document.createElement('div');
                iaDiv.className = 'msg';
                iaDiv.innerHTML = `<span class="ia-tag">[STV CONTRALÓGICA]</span> La objeción se descarta. Los datos del búnker demuestran que las estructuras metodológicas de grado (APA 7) y los teoremas exactos del sistema no se ven afectados por variables históricas o geopolíticas exógenas. El entregable técnico se valida de forma independiente.`;
                box.appendChild(iaDiv);
                box.scrollTop = box.scrollHeight;
            }, 600);
        }

        // Escuchar Ctrl + Espacio para disparar preguntas ocultas
        window.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.code === 'Space') {
                e.preventDefault();
                generarContraPreguntaFractorizada();
            }
        });

        function exec() {
            let input = document.getElementById('userInput');
            let box = document.getElementById('chatBox');
            let rawInput = input.value.trim();
            if(rawInput === "") return;

            let userDiv = document.createElement('div');
            userDiv.className = 'msg';
            userDiv.innerHTML = `<span class="user-tag">> ${rawInput}</span>`;
            box.appendChild(userDiv);

            let q = rawInput.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").replace(/y/g, 'i').replace(/k/g, 'c').replace(/b/g, 'v').replace(/h/g, '');
            let iaDiv = document.createElement('div');
            iaDiv.className = 'msg';

            let mejorCoincidencia = null;
            let maximaSimilitud = 0;
            let palabrasUsuario = q.split(' ');

            for (let item of baseConocimiento) {
                for (let clave of item.claves) {
                    for (let pal of palabrasUsuario) {
                        let sim = calcularSimilitud(pal, clave);
                        if (sim > maximaSimilitud) {
                            maximaSimilitud = sim;
                            mejorCoincidencia = item;
                        }
                    }
                }
            }

            if (maximaSimilitud >= 0.55 && mejorCoincidencia) {
                iaDiv.innerHTML = `<span class="ia-tag">[${mejorCoincidencia.cat}]</span>${mejorCoincidencia.res}`;
            } else {
                iaDiv.innerHTML = `<span class="ia-tag">[LOG INTERNO]</span> Variable "${rawInput.toUpperCase()}" indexada con éxito. Listo para cruzar con el marco metodológico oficial durante la defensa ante el jurado.`;
            }

            box.appendChild(iaDiv);
            input.value = "";
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
